<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Card Social</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>

  <!-- Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-left">
    <h2>Card Social</h2>
  </div>

  <div class="nav-center">
    <button id="nav-home">Home</button>
    <button id="nav-profile">Me</button>
    <button id="nav-buddies">Buddies</button>
  </div>

  <div class="nav-right" id="auth-section">
    <!-- JS inject -->
  </div>
</nav>


<!-- MAIN -->
<div class="main-container">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <h3>Menu</h3>
    <ul>
      <li id="menu-home">🏠 Home</li>
      <li id="menu-profile">👤 My Profile</li>
      <li id="menu-buddies">🤝 Buddies</li>
    </ul>
  </aside>


  <!-- CONTENT AREA -->
  <main class="content">

    <!-- ========================= -->
    <!-- HOME FEED -->
    <!-- ========================= -->
    <section id="home-page" class="page">

      <!-- POST BOX -->
      <div id="post-box" class="card hidden">
        <textarea id="post-input" placeholder="What's on your mind?"></textarea>

        <div class="post-tools">
          <input type="file" id="image-input">
          <button id="post-btn">Post</button>
        </div>
      </div>

      <!-- POSTS -->
      <div id="feed"></div>

    </section>


    <!-- ========================= -->
    <!-- PROFILE PAGE -->
    <!-- ========================= -->
    <section id="profile-page" class="page hidden">

      <div class="card">
        <h2 id="profile-username">Username</h2>
        <p id="profile-email">Email</p>
      </div>

      <div class="card">
        <h3>Your Posts</h3>
        <div id="my-posts"></div>
      </div>

    </section>


    <!-- ========================= -->
    <!-- BUDDY PAGE -->
    <!-- ========================= -->
    <section id="buddy-page" class="page hidden">

      <div class="card">
        <h3>Add Buddy</h3>
        <input id="buddy-input" placeholder="Enter username">
        <button id="add-buddy-btn">Add</button>
      </div>

      <div class="card">
        <h3>Your Buddies</h3>
        <div id="buddy-list"></div>
      </div>

    </section>

  </main>


  <!-- RIGHT SIDEBAR -->
  <aside class="rightbar">
    <h3>Info</h3>
    <p>Welcome to Card Social 🚀</p>
  </aside>

</div>


<!-- ========================= -->
<!-- AUTH MODAL -->
<!-- ========================= -->
<div id="auth-modal" class="modal hidden">
  <div class="modal-content">

    <h3 id="auth-title">Login</h3>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <!-- REGISTER ONLY -->
    <input id="username" class="hidden" placeholder="Username">

    <button id="auth-submit">Submit</button>

    <p id="switch-auth">Switch</p>
  </div>
</div>


<!-- ========================= -->
<!-- CHAT WINDOW -->
<!-- ========================= -->
<div id="chat-window" class="chat hidden">

  <div class="chat-header">
    <span id="chat-name">Chat</span>
    <button id="close-chat">X</button>
  </div>

  <div id="chat-messages" class="chat-messages"></div>

  <div class="chat-input-box">
    <input id="chat-input" placeholder="Message...">
    <button id="send-chat">Send</button>
  </div>

</div>


<!-- ========================= -->
<!-- TOAST -->
<!-- ========================= -->
<div id="toast" class="toast hidden"></div>


<!-- SCRIPT -->
<script src="app.js"></script>

</body>
</html>
